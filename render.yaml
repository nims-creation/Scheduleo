services:
  # ── Backend: Spring Boot API ─────────────────────────────────
  - type: web
    name: schedulo-api
    runtime: docker
    dockerfilePath: ./Schedulo/Dockerfile
    dockerContext: ./Schedulo
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: 8080
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: DB_SSL_MODE
        value: require
      - key: SPRING_DATA_REDIS_URL
        sync: false
      - key: SPRING_DATA_REDIS_SSL_ENABLED
        value: "true"
      - key: APP_JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: STRIPE_API_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false

  # ── Frontend: React / Vite SPA ────────────────────────────────
  - type: web
    name: schedulo-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    rootDir: ./frontend
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
