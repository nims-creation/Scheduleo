# ============================================================
# application.yml — Production-ready for Render deployment
# Works with: Supabase PostgreSQL + Upstash Redis
# ============================================================
spring:
  application:
    name: Schedulo
  main:
    allow-bean-definition-overriding: true
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # ── Database (Supabase PostgreSQL via pgBouncer) ──────────
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 600000
      # Skip pool validation at startup — app boots even if DB is momentarily slow
      initialization-fail-timeout: 0
      data-source-properties:
        # Disable server-side prepared statements (required for pgBouncer)
        prepareThreshold: 0
        preparedStatementCacheQueries: 0
        sslmode: ${DB_SSL_MODE:require}

  # ── JPA / Hibernate ───────────────────────────────────────
  jpa:
    hibernate:
      # NEVER use 'update/create' in production — tables already exist in Supabase
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        # Dialect is auto-detected from the JDBC driver (HHH90000025 fixed)
        format_sql: false
        default_schema: public
        jdbc:
          lob:
            non_contextual_creation: true
    open-in-view: false
    defer-datasource-initialization: true

  # ── Flyway (disabled — Supabase manages schema) ───────────
  flyway:
    enabled: false

  # ── Redis (Upstash via TLS) ───────────────────────────────
  data:
    redis:
      url: ${SPRING_DATA_REDIS_URL:redis://localhost:6379}
      ssl:
        enabled: ${SPRING_DATA_REDIS_SSL_ENABLED:false}
      lettuce:
        pool:
          max-active: 3
          max-idle: 3
          min-idle: 0
          max-wait: 2000ms

  # ── Mail (Gmail SMTP) ─────────────────────────────────────
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # ── OAuth2 (only registered when real credentials are provided) ──
  # Omit this entire block unless GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET
  # are real values. Spring auto-config creates a ClientRegistrationRepository
  # from any present registration key — a placeholder like "disabled" still
  # triggers the bean and causes a startup crash when oauth2Login() is called.
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope: email, profile

# ── Server ────────────────────────────────────────────────
server:
  port: ${PORT:8080}
  servlet:
    context-path: /
  tomcat:
    connection-timeout: 20000

# ── App Config ────────────────────────────────────────────
app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  jwt:
    secret: ${APP_JWT_SECRET:changeme-replace-in-production-with-32-char-secret}
    access-token-expiration-ms: 900000
    refresh-token-expiration-ms: 604800000

# ── Third Party ───────────────────────────────────────────
supabase:
  url: ${SUPABASE_URL:}
  key: ${SUPABASE_KEY:}

stripe:
  api-key: ${STRIPE_API_KEY:sk_test_placeholder}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}

# ── API Docs ─────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# ── Logging ──────────────────────────────────────────────
logging:
  level:
    root: WARN
    com.saas.Schedulo: INFO
    org.springframework.security: WARN
    org.hibernate: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level [%logger{36}] - %msg%n"

# ── Actuator ─────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
