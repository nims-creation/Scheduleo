# application.yml - Production-safe configuration
# Tuned for: Supabase PostgreSQL (port 6543 / pgBouncer) + Upstash Redis (TLS)
spring:
  application:
    name: Schedulo
  main:
    allow-bean-definition-overriding: true
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/timetable_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      # Required for Supabase pgBouncer (port 6543 transaction mode)
      # Disables server-side prepared statements which pgBouncer doesn't support
      data-source-properties:
        prepareThreshold: 0
        preparedStatementCacheQueries: 0
        sslmode: require

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        # Explicit dialect required — prevents "Unable to determine Dialect" error
        # when Hibernate can't probe JDBC metadata at startup
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
        # Disable prepared statement caching for pgBouncer compatibility
        jdbc:
          lob:
            non_contextual_creation: true
    open-in-view: false

  flyway:
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      # Supports both SPRING_DATA_REDIS_URL (your Render var) and REDIS_URL
      url: ${SPRING_DATA_REDIS_URL:${REDIS_URL:redis://localhost:6379}}
      ssl:
        # Set to true for Upstash (rediss:// URL) — your var is SPRING_DATA_REDIS_SSL_ENABLED=true
        enabled: ${SPRING_DATA_REDIS_SSL_ENABLED:false}
      lettuce:
        pool:
          max-active: 4
          max-idle: 4
          min-idle: 0
          max-wait: 2000ms

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:noreply@schedulo.app}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:disabled}
            client-secret: ${GOOGLE_CLIENT_SECRET:disabled}
            scope: email, profile


server:
  port: ${PORT:${SERVER_PORT:8080}}
  servlet:
    context-path: /
  tomcat:
    connection-timeout: 20000

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  jwt:
    secret: ${APP_JWT_SECRET:${JWT_SECRET:changeme-use-env-var-in-production}}
    access-token-expiration-ms: 900000
    refresh-token-expiration-ms: 604800000

supabase:
  url: ${SUPABASE_URL:http://localhost}
  key: ${SUPABASE_KEY:placeholder}

stripe:
  api-key: ${STRIPE_API_KEY:sk_test_placeholder}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    root: INFO
    com.saas: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: when_authorized
